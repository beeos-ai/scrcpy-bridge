name: release-scrcpy-bridge

# Triggered when a tag like `scrcpy-bridge-v0.1.0` is pushed. Produces:
#   1. Static per-target archives (via cargo-dist) uploaded to the GitHub
#      release as download assets. Consumed by `@beeos-ai/cli` when users
#      run `beeos device attach`.
#   2. A distroless multi-arch Docker image, pushed to GHCR. Consumed by
#      the ReDroid Pod sidecar in `deploy/redroid/pod.yaml`.
#
# See Cargo.toml `[package.metadata.dist]` for the list of targets.
on:
  push:
    tags:
      - "scrcpy-bridge-v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
    steps:
      - id: derive
        run: |
          tag="${GITHUB_REF_NAME#scrcpy-bridge-v}"
          echo "version=$tag" >> "$GITHUB_OUTPUT"

  binaries:
    name: binaries (${{ matrix.target }})
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,   runner: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu,  runner: ubuntu-22.04, cross: true }
          - { target: x86_64-unknown-linux-musl,  runner: ubuntu-22.04, cross: true }
          - { target: aarch64-unknown-linux-musl, runner: ubuntu-22.04, cross: true }
          - { target: x86_64-apple-darwin,        runner: macos-13 }
          - { target: aarch64-apple-darwin,       runner: macos-14 }
          - { target: x86_64-pc-windows-msvc,     runner: windows-2022 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux only)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build (native)
        if: matrix.cross != true
        working-directory: .
        run: cargo build --release --target ${{ matrix.target }} --profile dist --locked

      - name: Build (cross)
        if: matrix.cross == true
        working-directory: .
        run: cross build --release --target ${{ matrix.target }} --profile dist --locked

      - name: Package archive
        id: pack
        shell: bash
        # Archive name is intentionally version-less so that the BeeOS CLI
        # can resolve it via `/releases/latest/download/<name>` without
        # first fetching the latest tag. See
        # web/packages/core/src/runtime/scrcpy-bridge.ts:archiveName().
        run: |
          bin="scrcpy-bridge"
          if [[ "${{ matrix.target }}" == *windows* ]]; then bin="scrcpy-bridge.exe"; fi
          stage="scrcpy-bridge-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/dist/${bin}" "$stage/"
          cp README.md LICENSE 2>/dev/null "$stage/" || true
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "${stage}.zip" "$stage"
            echo "asset=${stage}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "${stage}.tar.gz" "$stage"
            echo "asset=${stage}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.pack.outputs.asset }}
          fail_on_unmatched_files: true

  docker:
    name: distroless docker image
    needs: [plan, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.distroless
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/beeos-ai/scrcpy-bridge:${{ needs.plan.outputs.version }}
            ghcr.io/beeos-ai/scrcpy-bridge:latest
          build-args: |
            VERSION=${{ needs.plan.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
