name: release-scrcpy-bridge

# Triggered when a tag like `scrcpy-bridge-v0.1.0` is pushed. Produces:
#   1. Static per-target archives (via cargo-dist) uploaded to the GitHub
#      release as download assets. Consumed by `@beeos-ai/cli` when users
#      run `beeos device attach`.
#   2. A distroless multi-arch Docker image, pushed to GHCR. Consumed by
#      the ReDroid Pod sidecar in `deploy/redroid/pod.yaml`.
#
# Tag format conventions:
#   - `scrcpy-bridge-v0.1.0`        -> stable release (updates `:latest`)
#   - `scrcpy-bridge-v0.1.0-rc.1`   -> prerelease (does NOT update `:latest`,
#                                      GH release marked prerelease)
#   - `scrcpy-bridge-v0.1.0-staging.1` -> same prerelease semantics, for
#                                         staging-only validation
#
# Any semver-style pre-release suffix (a `-` after the version) flips the
# release into prerelease mode so staging consumers can pin to the specific
# `:<version>` tag via `SCRCPY_BRIDGE_IMAGE` without affecting production
# ReDroid Pods that track `:latest`.
#
# See Cargo.toml `[package.metadata.dist]` for the list of targets.
on:
  push:
    tags:
      - "scrcpy-bridge-v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
      prerelease: ${{ steps.derive.outputs.prerelease }}
    steps:
      - id: derive
        run: |
          tag="${GITHUB_REF_NAME#scrcpy-bridge-v}"
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  binaries:
    name: binaries (${{ matrix.target }})
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,   runner: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu,  runner: ubuntu-22.04, cross: true }
          - { target: x86_64-unknown-linux-musl,  runner: ubuntu-22.04, cross: true }
          - { target: aarch64-unknown-linux-musl, runner: ubuntu-22.04, cross: true }
          # x86_64 macs are cross-compiled on a macos-14 (Apple Silicon)
          # runner. macos-13 (Intel) runners are heavily oversubscribed
          # in the GitHub-hosted pool and frequently take 30+ minutes
          # to allocate; cross-compiling from arm to x86 on darwin works
          # natively because Xcode ships both SDKs, and dtolnay's action
          # installs the rustup target via `targets:` below.
          - { target: x86_64-apple-darwin,        runner: macos-14 }
          - { target: aarch64-apple-darwin,       runner: macos-14 }
          - { target: x86_64-pc-windows-msvc,     runner: windows-2022 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux only)
        if: matrix.cross == true
        run: cargo install cross --locked

      # Note: --release is the alias for --profile release; cargo 1.95+
      # rejects combining it with an explicit --profile <other>. The
      # `dist` profile defined in Cargo.toml already implies release-grade
      # optimization, so we drop --release.
      - name: Build (native)
        if: matrix.cross != true
        working-directory: .
        run: cargo build --target ${{ matrix.target }} --profile dist --locked

      - name: Build (cross)
        if: matrix.cross == true
        working-directory: .
        run: cross build --target ${{ matrix.target }} --profile dist --locked

      - name: Package archive
        id: pack
        shell: bash
        # Archive name is intentionally version-less so the BeeOS CLI can
        # fetch it at a stable URL:
        #   /releases/latest/download/scrcpy-bridge-<target>.tar.gz
        # GitHub redirects `latest/download` to whichever tag is marked
        # "latest" in the repo's Releases page. See
        # web/packages/core/src/sidecars/cargo-dist.ts (archiveName +
        # releaseBaseUrl).
        run: |
          bin="scrcpy-bridge"
          if [[ "${{ matrix.target }}" == *windows* ]]; then bin="scrcpy-bridge.exe"; fi
          stage="scrcpy-bridge-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/dist/${bin}" "$stage/"
          cp README.md LICENSE 2>/dev/null "$stage/" || true
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "${stage}.zip" "$stage"
            archive="${stage}.zip"
          else
            tar -czf "${stage}.tar.gz" "$stage"
            archive="${stage}.tar.gz"
          fi
          # Publish SHA256 sidecar alongside the archive — the CLI
          # validates archive integrity against this digest (see
          # cargo-dist.ts). Missing digest is a soft warning for
          # back-compat but we always ship it in prod releases to
          # catch truncated downloads / CDN tampering.
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" | awk '{print $1"  "$2}' > "${archive}.sha256"
          else
            sha256sum "$archive" | awk '{print $1"  "$2}' > "${archive}.sha256"
          fi
          echo "asset=$archive"            >> "$GITHUB_OUTPUT"
          echo "digest=${archive}.sha256"  >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.pack.outputs.asset }}
            ${{ steps.pack.outputs.digest }}
          fail_on_unmatched_files: true
          prerelease: ${{ needs.plan.outputs.prerelease == 'true' }}

  docker:
    name: distroless docker image
    needs: [plan, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: imgtags
        shell: bash
        run: |
          ver="${{ needs.plan.outputs.version }}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/beeos-ai/scrcpy-bridge:${ver}"
            if [[ "${{ needs.plan.outputs.prerelease }}" != "true" ]]; then
              echo "ghcr.io/beeos-ai/scrcpy-bridge:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.distroless
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.imgtags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.plan.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
